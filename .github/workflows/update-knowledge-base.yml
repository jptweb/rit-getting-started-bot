name: Update Knowledge Base

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdownify beautifulsoup4 requests

      - name: Fetch and convert Google Doc
        run: python scripts/update_knowledge_base.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet knowledge_rit-gettings-started-2251.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge_rit-gettings-started-2251.md
          git commit -m "Update knowledge base from Google Doc"
          git push
